<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons (optional but good for weather icons if not using images) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- API Key Modal -->
    <div class="modal fade" id="apiKeyModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="apiKeyModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="apiKeyModalLabel">Welcome to Weather Dashboard</h5>
                </div>
                <div class="modal-body">
                    <p>To use this app, please enter your OpenWeatherMap API Key.</p>
                    <div class="mb-3">
                        <label for="apiKeyInput" class="form-label">API Key</label>
                        <input type="text" class="form-control" id="apiKeyInput" placeholder="Enter your API Key">
                        <div class="form-text">Your key is stored locally in your browser session.</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="saveApiKeyBtn">Start App</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mt-4">
        <h1 class="text-center mb-4">Weather Dashboard</h1>

        <!-- Controls Row -->
        <div class="row mb-4">
            <div class="col-md-6 mb-2">
                <div class="input-group">
                    <input type="text" class="form-control" id="cityInput" placeholder="Enter City Name">
                    <button class="btn btn-primary" type="button" id="searchBtn">Search</button>
                </div>
            </div>
            <div class="col-md-6 mb-2 d-flex justify-content-between align-items-center">
                <button class="btn btn-secondary me-2" id="currentLocationBtn">
                    <i class="fas fa-location-arrow"></i> Use My Location
                </button>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="unitToggle">
                    <label class="form-check-label" for="unitToggle">°F</label>
                </div>
            </div>
        </div>

        <!-- Alert Area -->
        <div id="alertContainer"></div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="d-none text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Weather Display -->
        <div id="weatherDisplay" class="d-none">
            <!-- Current Weather Card -->
            <div class="card mb-4 text-white shadow" id="currentWeatherCard">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <h2 class="card-title" id="cityName">City Name</h2>
                            <p class="card-text" id="currentDate">Date</p>
                            <div class="d-flex align-items-center">
                                <img id="weatherIcon" src="" alt="Weather Icon" class="weather-icon-lg">
                                <h1 class="display-3 ms-3"><span id="temperature">--</span><span id="tempUnit">°C</span></h1>
                            </div>
                            <p class="lead" id="weatherDescription">Condition</p>
                        </div>
                        <div class="col-md-6">
                            <ul class="list-unstyled">
                                <li><strong>Humidity:</strong> <span id="humidity">--</span>%</li>
                                <li><strong>Wind Speed:</strong> <span id="windSpeed">--</span> <span id="windUnit">m/s</span></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <h3>5-Day Forecast</h3>
            <div class="row row-cols-1 row-cols-md-5 g-4" id="forecastGrid">
                <!-- Forecast Cards will be injected here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
